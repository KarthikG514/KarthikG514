name: 🔄 Daily Profile Refresh

on:
  schedule:
    - cron: "0 0 * * *"   # Every day at midnight UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  update-readme:
    name: Refresh GitHub Stats & Analytics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔃 Update README Timestamp
        run: |
          echo "Last auto-refreshed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last-updated
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .last-updated
          git diff --staged --quiet || git commit -m "chore(auto): daily profile refresh [$(date -u '+%Y-%m-%d')]"
          git push
